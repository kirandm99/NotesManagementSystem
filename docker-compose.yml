services:
  app:
    build: .
    ports:
      - "8080:8000"
    environment:
      APP_NAME: "Laravel AI Notes"
      APP_ENV: local
      APP_KEY: "base64:55Pz7WFWYO3lobv+Ar3QghWr6d9KC4biCDMlj/RwyKE="
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8080"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: notes_ai
      DB_USERNAME: notes_user
      DB_PASSWORD: notes_password
      CACHE_STORE: array
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    command: >
      sh -c "php -r 'for ($$i = 0; $$i < 60; $$i++) { try { new PDO(\"mysql:host=db;port=3306;dbname=notes_ai\", \"notes_user\", \"notes_password\"); exit(0); } catch (Throwable $$e) { sleep(1); } } exit(1);' &&
             php artisan optimize:clear &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: notes_ai
      MYSQL_USER: notes_user
      MYSQL_PASSWORD: notes_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
