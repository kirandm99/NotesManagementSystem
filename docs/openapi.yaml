openapi: 3.0.3
info:
  title: Laravel AI Notes Management API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /api/notes:
    get:
      summary: List notes with pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Paginated notes
    post:
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note created
        "422":
          description: Validation failed
  /api/notes/search:
    get:
      summary: Semantic search notes
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Matching notes ordered by similarity
  /api/notes/{id}:
    get:
      summary: Get one note
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Note found
        "404":
          description: Note not found
    put:
      summary: Update one note
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Note updated
        "422":
          description: Validation failed
    delete:
      summary: Delete one note
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Note deleted
  /api/notes/{id}/summary:
    post:
      summary: Generate an AI summary for one note
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Summary generated
components:
  parameters:
    NoteId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  schemas:
    NoteInput:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          maxLength: 180
        content:
          type: string
          maxLength: 20000
        tags:
          type: string
          maxLength: 255

